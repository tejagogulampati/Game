<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Water Rush</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #d9f4ff;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        #game {
            width: 360px;
            height: 600px;
            background: linear-gradient(#69c6ff, #b7ebff);
            border-radius: 20px;
            border: 4px solid #3a9edb;
            position: relative;
            overflow: hidden;
        }

        /* UI */
        #top {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #logo {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #3a9edb;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Difficulty Selection */
        #difficulty-container {
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .diff-row {
            display: flex;
            gap: 10px;
        }

        #difficulty-container button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: white;
            transition: 0.2s;
            font-weight: bold;
        }

        .selected {
            background: #ffd400 !important;
            transform: scale(1.1);
        }

        /* Bucket */
        #bucket {
            position: absolute;
            bottom: 100px;
            left: 140px;
            font-size: 60px;
            user-select: none;
            transition: left 0.1s ease-out; /* Smoother movement */
        }

        /* Drops */
        .drop {
            position: absolute;
            font-size: 35px;
            z-index: 5;
        }

        /* Progress Bar */
        #progressBar {
            position: absolute;
            bottom: 60px;
            left: 30px;
            width: 300px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            border: 2px solid white;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff9d, #8cff00);
            transition: width 0.3s;
        }

        #donation {
            position: absolute;
            bottom: 35px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
        }

        #message {
            position: absolute;
            top: 80px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            color: #fff;
            font-size: 24px;
            pointer-events: none;
        }

        /* Overlay Menus */
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            background: #ffd400;
            border: none;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #ccaa00;
            z-index: 20;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            display: none;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 30;
            width: 250px;
        }

        #footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
        }
        
        #footer a { color: #3a9edb; text-decoration: none; }
    </style>
</head>
<body>

<div id="game">
    <div id="top">
        <div>Score: <span id="score">0</span></div>
        <div id="lives">❤️❤️❤️</div>
    </div>

    <div id="logo">charity: water</div>
    <div id="message"></div>
    <div id="bucket">🪣</div>

    <div id="progressBar">
        <div id="progress"></div>
    </div>
    <div id="donation">Donation: $0</div>

    <button id="startBtn" onclick="startGame()">Start Game</button>

    <div id="difficulty-container">
        <div class="diff-row">
            <button class="diff-btn" onclick="setDifficulty(event, 1000)">Easy</button>
            <button class="diff-btn selected" onclick="setDifficulty(event, 700)">Normal</button>
            <button class="diff-btn" onclick="setDifficulty(event, 400)">Hard</button>
        </div>
    </div>

    <div id="gameOver">
        <h2>Game Over</h2>
        <p id="final"></p>
        <button id="startBtn" style="position:static; transform:none;" onclick="startGame()">Play Again</button>
    </div>

    <div id="footer">
        <a href="https://www.charitywater.org/" target="_blank">Website</a> | 
        <a href="https://www.charitywater.org/donate" target="_blank">Donate</a>
    </div>
</div>

<script>
    let score = 0;
    let lives = 3;
    let donation = 0;
    let bucketX = 140;
    let gameActive = false;
    let gameLoop;
    let spawnRate = 700; // Default Normal
    const bucket = document.getElementById("bucket");

    function setDifficulty(e, rate) {
        spawnRate = rate;
        document.querySelectorAll(".diff-btn").forEach(btn => btn.classList.remove("selected"));
        e.target.classList.add("selected");
    }

    function showMessage(text) {
        const msgDiv = document.getElementById("message");
        msgDiv.innerText = text;
        setTimeout(() => msgDiv.innerText = "", 2000);
    }

    function startGame() {
        // Reset Variables
        score = 0;
        lives = 3;
        donation = 0;
        gameActive = true;

        // Reset UI
        document.getElementById("score").innerText = score;
        document.getElementById("lives").innerText = "❤️❤️❤️";
        document.getElementById("donation").innerText = "Donation: $0";
        document.getElementById("progress").style.width = "0%";
        document.getElementById("gameOver").style.display = "none";
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("difficulty-container").style.display = "none";

        // Clear any existing loops
        clearInterval(gameLoop);
        gameLoop = setInterval(createDrop, spawnRate);
    }

    // Smooth Movement Logic
    document.addEventListener("keydown", (e) => {
        if (!gameActive) return;
        if (e.key === "ArrowLeft" && bucketX > 0) bucketX -= 40;
        if (e.key === "ArrowRight" && bucketX < 280) bucketX += 40;
        bucket.style.left = bucketX + "px";
    });

    function createDrop() {
        if (!gameActive) return;

        const drop = document.createElement("div");
        const isBad = Math.random() < 0.2;
        
        drop.innerText = isBad ? "🦠" : "💧";
        drop.className = "drop";
        drop.style.left = Math.random() * 320 + "px";
        drop.style.top = "-50px";
        document.getElementById("game").appendChild(drop);

        let fallSpeed = 5;
        let fallInterval = setInterval(() => {
            if (!gameActive) {
                clearInterval(fallInterval);
                drop.remove();
                return;
            }

            let currentTop = parseInt(drop.style.top);
            drop.style.top = (currentTop + fallSpeed) + "px";

            // Collision Detection
            if (currentTop > 420 && currentTop < 480) {
                let dropLeft = parseInt(drop.style.left);
                // Check if drop is within bucket width (approx 80px)
                if (dropLeft + 30 > bucketX && dropLeft < bucketX + 70) {
                    handleCollision(isBad);
                    clearInterval(fallInterval);
                    drop.remove();
                }
            }

            // Remove if off screen
            if (currentTop > 600) {
                clearInterval(fallInterval);
                drop.remove();
            }
        }, 30);
    }

    function handleCollision(isBad) {
        if (isBad) {
            lives--;
            updateLivesUI();
            if (lives <= 0) endGame();
        } else {
            score += 10;
            donation += 1;
            document.getElementById("score").innerText = score;
            document.getElementById("donation").innerText = "Donation: $" + donation;
            
            // Progress bar fills up to $50 milestone
            let progressPercent = Math.min((donation / 50) * 100, 100);
            document.getElementById("progress").style.width = progressPercent + "%";

            if (score === 50) showMessage("Nice Start!");
            if (score === 150) showMessage("Amazing Progress!");
            if (score === 300) showMessage("Hero Status!");
        }
    }

    function updateLivesUI() {
        let hearts = "";
        for(let i=0; i<lives; i++) hearts += "❤️";
        document.getElementById("lives").innerText = hearts || "💀";
    }

    function endGame() {
        gameActive = false;
        clearInterval(gameLoop);
        
        // Show Game Over UI
        document.getElementById("final").innerText = `Score: ${score} | Donation: $${donation}`;
        document.getElementById("gameOver").style.display = "block";
        document.getElementById("startBtn").style.display = "block";
        document.getElementById("difficulty-container").style.display = "flex";
        
        // Cleanup remaining drops
        document.querySelectorAll(".drop").forEach(d => d.remove());
    }
</script>

</body>
</html>
